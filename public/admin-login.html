<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Heart & Soul Parrot Rescue</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      background: #f0f0f0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .login-header h1 {
      margin: 0;
      color: #333;
      font-size: 1.5rem;
    }

    .login-header p {
      margin: 0.5rem 0 0;
      color: #666;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .error-message {
      background-color: #fee;
      border-left: 4px solid #dc2626;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      color: #dc2626;
      display: none;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background-color: #efe;
      border-left: 4px solid #16a34a;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      color: #16a34a;
      display: none;
      font-size: 0.9rem;
    }

    .success-message.show {
      display: block;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #666;
    }

    .login-footer a {
      color: #667eea;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .demo-credentials {
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #666;
    }

    .demo-credentials strong {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .demo-credentials p {
      margin: 0.25rem 0;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">🦜</div>
      <h1>Admin Panel</h1>
      <p>Heart & Soul Parrot Rescue</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Login</button>
    </form>

    <div class="demo-credentials">
      <strong>Demo Credentials:</strong>
      <p><strong>Username:</strong> dalton</p>
      <p><strong>Password:</strong> 262321</p>
    </div>

    <div class="login-footer">
      <p>© 2026 Heart and Soul Parrot Rescue</p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Login failed');
        }

        const result = await response.json();
        
        // Store authentication token in localStorage
        localStorage.setItem('adminToken', JSON.stringify(result.user));
        
        successMessage.textContent = 'Login successful! Redirecting...';
        successMessage.classList.add('show');

        // Redirect to admin panel after 1 second
        setTimeout(() => {
          window.location.href = '/admin.html';
        }, 1000);
      } catch (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });

    // Check if already logged in
    window.addEventListener('load', () => {
      const adminToken = localStorage.getItem('adminToken');
      if (adminToken) {
        window.location.href = '/admin.html';
      }
    });
  </script>
</body>
</html>
